<head>
  <meta charset="UTF-8" />

  <title>Test — No Plugins</title>

  <script type="importmap">
      {
         "imports": { 
          "gsap": "https://cdn.jsdelivr.net/npm/gsap@3/+esm"
        }
     }
    </script>

  <script type="module">
    console.log("No plugins");
    import gsap from "gsap";
    import { smil } from "../../lib/index.js";

    // TODO: Pause GSAP tween on document visibility change, SMIL animations do that automatically
    // TODO: Add a combined stagger + timeline + keyframes example once all three interact correctly
    // ex: https://codepen.io/BlogFire/pen/rNEoPVR
    // ex: https://codepen.io/snorkltv/pen/wvvzGEX

    // ! There's a problem with the easings, they're slightly different between the two

    // 1. to() — translate
    gsap.to("#g-translate", { x: 210, duration: 1.2, repeat: -1, ease: "power1.inOut" });
    smil.to("#s-translate", { x: 210, duration: 1.2, repeat: -1, ease: "power1.inOut" });

    // 2. to() — opacity
    gsap.to("#g-opacity", { opacity: 0.1, duration: 1, repeat: -1, ease: "sine.inOut" });
    smil.to("#s-opacity", { opacity: 0.1, duration: 1, repeat: -1, ease: "sine.inOut" });

    // 3. to() — rotation (continuous 360, no easing)
    gsap.to("#g-rotation", { rotation: 360, duration: 2, repeat: -1, ease: "linear", transformOrigin: "50% 50%" });
    // ! Issue: transform origin ain't referring to the element, but the parent container
    smil.to("#s-rotation", { rotation: 360, duration: 2, repeat: -1, ease: "linear", transformOrigin: "50% 50%" });

    // 4. from() — dot slides in from x=-110 to its natural center position
    gsap.from("#g-from", { x: -110, duration: 1, repeat: -1, ease: "power2.out" });
    smil.from("#s-from", { x: -110, duration: 1, repeat: -1, ease: "power2.out" });

    // 5. fromTo() — dot travels between two explicit x positions
    gsap.fromTo("#g-fromto", { x: -100 }, { x: 100, duration: 1, repeat: -1, ease: "power1.inOut" });
    smil.fromTo("#s-fromto", { x: -100 }, { x: 100, duration: 1, repeat: -1, ease: "power1.inOut" });

    // 6. stagger — dots pop up one by one
    gsap.to(".g-stagger", { y: -40, duration: 0.5, repeat: -1, stagger: 0.12, ease: "power1.out" });
    smil.to(".s-stagger", { y: -40, duration: 0.5, repeat: -1, stagger: 0.12, ease: "power1.out" });

    // 7. timeline() — three circles fade in sequentially
    const gTl = gsap.timeline();
    gTl.to("#g-tl-a", { opacity: 1, duration: 0.6, ease: "power2.out" });
    gTl.to("#g-tl-b", { opacity: 1, duration: 0.6, ease: "power2.out" });
    gTl.to("#g-tl-c", { opacity: 1, duration: 0.6, ease: "power2.out" });

    const sTl = smil.timeline();
    sTl.to("#s-tl-a", { opacity: 1, duration: 0.6, ease: "power2.out" });
    sTl.to("#s-tl-b", { opacity: 1, duration: 0.6, ease: "power2.out" });
    sTl.to("#s-tl-c", { opacity: 1, duration: 0.6, ease: "power2.out" });

    // 8. keyframes (% form) + stagger + yoyo — ripple wave
    const waveKf = {
      "10%": { skewX: 15, scaleX: 3 },
      "25%": { skewX: -20, scaleX: 1.1 },
      "50%": { skewX: -25, scaleX: 0.25 },
      "70%": { skewX: -15, scaleX: 1.05 },
      "100%": { skewX: 10, scaleX: 0.95 },
    };
    gsap.to(".g-wave", { keyframes: waveKf, transformOrigin: "50% 50%", duration: 15, repeat: -1, yoyo: true, stagger: { amount: 3, from: "start" } });
    smil.to(".s-wave", { keyframes: waveKf, transformOrigin: "50% 50%", duration: 15, repeat: -1, yoyo: true, stagger: { amount: 3, from: "start" } });

    // 9. timeline() — labels, sequencing, overlaps, and mixed property changes
    const gTl2 = gsap.timeline();
    gTl2.addLabel("start");
    gTl2.to("#g-tlkf-a", { x: 80, opacity: 0.35, fill: "#38bdf8", duration: 0.45, ease: "sine.inOut" }, "start");
    gTl2.to("#g-tlkf-b", { y: -38, opacity: 0.65, fill: "#facc15", duration: 0.5, ease: "power1.out" }, ">");
    gTl2.addLabel("cross");
    gTl2.to("#g-tlkf-a", { y: 52, scale: 1.35, fill: "#22c55e", duration: 0.6, ease: "power2.out" }, "cross");
    gTl2.to("#g-tlkf-b", { x: 105, scale: 0.75, opacity: 0.35, fill: "#fb7185", duration: 0.55, ease: "power1.inOut" }, "cross+=0.15");
    gTl2.to("#g-tlkf-a", { opacity: 1, fill: "#a3e635", duration: 0.35, ease: "sine.inOut" }, ">-0.2");
    gTl2.to("#g-tlkf-b", { opacity: 1, fill: "#f97316", duration: 0.35, ease: "sine.inOut" }, "<");

    const sTl2 = smil.timeline();
    sTl2.addLabel("start");
    sTl2.to("#s-tlkf-a", { x: 80, opacity: 0.35, fill: "#38bdf8", duration: 0.45, ease: "sine.inOut" }, "start");
    sTl2.to("#s-tlkf-b", { y: -38, opacity: 0.65, fill: "#facc15", duration: 0.5, ease: "power1.out" }, ">");
    sTl2.addLabel("cross");
    sTl2.to("#s-tlkf-a", { y: 52, scale: 1.35, fill: "#22c55e", duration: 0.6, ease: "power2.out" }, "cross");
    sTl2.to("#s-tlkf-b", { x: 105, scale: 0.75, opacity: 0.35, fill: "#fb7185", duration: 0.55, ease: "power1.inOut" }, "cross+=0.15");
    sTl2.to("#s-tlkf-a", { opacity: 1, fill: "#a3e635", duration: 0.35, ease: "sine.inOut" }, ">-0.2");
    sTl2.to("#s-tlkf-b", { opacity: 1, fill: "#f97316", duration: 0.35, ease: "sine.inOut" }, "<");
  </script>
