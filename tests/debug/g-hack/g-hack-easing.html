<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title><g> hack — easing variant (power2.inOut)</title>
<style>
  :root { color-scheme: dark; }
  body { background: #111; color: #eee; font-family: monospace; padding: 1.5rem; }
  h1 { font-size: 0.9rem; }
  h3 { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.45; margin: 0.75rem 0 0.25rem; }
  svg { border: 1px solid #2a2a2a; background: #1a1a1a; display: block; }
  p { font-size: 0.65rem; opacity: 0.6; margin: 0.15rem 0; }
  pre {
    background: #1a1a1a; border: 1px solid #2a2a2a; padding: 0.5rem;
    font-size: 0.65rem; max-height: 40vh; overflow: auto; margin: 0.5rem 0 0;
    white-space: pre-wrap; line-height: 1.3;
  }
  .fail { color: #f87171; }
  .pass { color: #34d399; }
</style>
</head>
<body>

<h1>&lt;g&gt; hack — easing comparison</h1>

<h3>
  <label>
    <input type="checkbox" class="log-toggle" id="log-p2" checked>
    <span>Test C: power2.inOut</span>
  </label>
</h3>
<svg id="svg-c" width="500" height="100" xmlns="http://www.w3.org/2000/svg">
  <rect id="gsap-rect" x="50" y="20" width="40" height="40" fill="#34d399" fill-opacity="0.5" />

  <g>
    <g id="smil-outer">
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="50 0" begin="0s" dur="1s" fill="freeze" additive="sum"
        calcMode="spline" keyTimes="0; 1" keySplines="0.65 0 0.35 1" />
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="100 0" begin="1s" dur="1s" fill="freeze" additive="sum"
        calcMode="spline" keyTimes="0; 1" keySplines="0.65 0 0.35 1" />

      <g transform="translate(70,40)">
        <g id="smil-inner">
          <animateTransform attributeName="transform" type="scale"
            from="1 1" to="1.5 1.5" begin="0s" dur="1s" fill="freeze" additive="sum"
            calcMode="spline" keyTimes="0; 1" keySplines="0.65 0 0.35 1" />
          <animateTransform attributeName="transform" type="scale"
            from="1 1" to="1.333 1.333" begin="1s" dur="1s" fill="freeze" additive="sum"
            calcMode="spline" keyTimes="0; 1" keySplines="0.65 0 0.35 1" />
          <animateTransform attributeName="transform" type="skewX"
            from="0" to="10" begin="0s" dur="1s" fill="freeze" additive="sum"
            calcMode="spline" keyTimes="0; 1" keySplines="0.65 0 0.35 1" />

          <g transform="translate(-70,-40)">
            <rect id="smil-rect" x="50" y="20" width="40" height="40" fill="#f97316" fill-opacity="0.5" />
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>

<!-- ═══════════════════════════════════════════ -->
<!-- Test D: ease-in-out                          -->
<!-- ═══════════════════════════════════════════ -->
<h3>
  <label>
    <input type="checkbox" class="log-toggle" id="log-ease" checked>
    <span>Test D: ease-in-out (0.42, 0, 0.58, 1)</span>
  </label>
</h3>
<svg id="svg-d" width="500" height="100" xmlns="http://www.w3.org/2000/svg">
  <rect id="gsap-ease" x="50" y="20" width="40" height="40" fill="#34d399" fill-opacity="0.5" />

  <g>
    <g id="smil-outer-d">
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="50 0" begin="0s" dur="1s" fill="freeze" additive="sum"
        calcMode="spline" keyTimes="0; 1" keySplines="0.42 0 0.58 1" />
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="100 0" begin="1s" dur="1s" fill="freeze" additive="sum"
        calcMode="spline" keyTimes="0; 1" keySplines="0.42 0 0.58 1" />

      <g transform="translate(70,40)">
        <g>
          <animateTransform attributeName="transform" type="scale"
            from="1 1" to="1.5 1.5" begin="0s" dur="1s" fill="freeze" additive="sum"
            calcMode="spline" keyTimes="0; 1" keySplines="0.42 0 0.58 1" />
          <animateTransform attributeName="transform" type="scale"
            from="1 1" to="1.333 1.333" begin="1s" dur="1s" fill="freeze" additive="sum"
            calcMode="spline" keyTimes="0; 1" keySplines="0.42 0 0.58 1" />
          <animateTransform attributeName="transform" type="skewX"
            from="0" to="10" begin="0s" dur="1s" fill="freeze" additive="sum"
            calcMode="spline" keyTimes="0; 1" keySplines="0.42 0 0.58 1" />

          <g transform="translate(-70,-40)">
            <rect id="smil-ease" x="50" y="20" width="40" height="40" fill="#f97316" fill-opacity="0.5" />
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>

<pre id="output">Sampling...</pre>

<script type="module">
  import gsap from "https://cdn.jsdelivr.net/npm/gsap@3/+esm";
  import { AnimationDebugger, writeDebugLog } from "../../../lib/index.js";

  // GSAP timeline for Test C (power2.inOut)
  const tlP2 = gsap.timeline();
  tlP2.to("#gsap-rect", {
    x: 50, scale: 1.5, skewX: 10,
    transformOrigin: "50% 50%",
    duration: 1, ease: "power2.inOut",
  });
  tlP2.to("#gsap-rect", {
    x: 150, scale: 2,
    transformOrigin: "50% 50%",
    duration: 1, ease: "power2.inOut",
  });

  // GSAP timeline for Test D (ease-in-out)
  const tlEase = gsap.timeline();
  tlEase.to("#gsap-ease", {
    x: 50, scale: 1.5, skewX: 10,
    transformOrigin: "50% 50%",
    duration: 1, ease: "ease-in-out",
  });
  tlEase.to("#gsap-ease", {
    x: 150, scale: 2,
    transformOrigin: "50% 50%",
    duration: 1, ease: "ease-in-out",
  });

  async function buildLog(testId, gsapId, smilId, svgId, label) {
    const svg = document.getElementById(svgId);
    const svgRect = svg.getBoundingClientRect();
    const gsapEl = document.getElementById(gsapId);
    const smilEl = document.getElementById(smilId);

    const samples = await AnimationDebugger.sample({
      pairs: [{ gsapElement: gsapEl, smilElement: smilEl, label }],
      duration: 2.3,
      fps: 15,
    });

    const lines = [`easing: ${label}`];
    lines.push("time     elapsed  GSAP(x,y)         SMIL(x,y)          Δx      Δy");
    lines.push("─".repeat(78));
    let maxDx = 0, maxDy = 0, fails = 0;

    for (const frame of samples) {
      const p = frame.pairs[0];
      const gx = p.gsapLeft - svgRect.left;
      const gy = p.gsapTop - svgRect.top;
      const sx = p.smilLeft - svgRect.left;
      const sy = p.smilTop - svgRect.top;
      const dx = Math.abs(gx - sx);
      const dy = Math.abs(gy - sy);
      const tag = (dx > 1 || dy > 1) ? "FAIL" : "ok";
      if (tag === "FAIL") fails++;
      if (dx > maxDx) maxDx = dx;
      if (dy > maxDy) maxDy = dy;

      lines.push(
        `${String(Math.round(frame.timestamp)).padStart(5)}  ` +
        `${frame.elapsed.toFixed(2).padStart(5)}s  ` +
        `(${gx.toFixed(1).padStart(6)}, ${gy.toFixed(1).padStart(6)})  ` +
        `(${sx.toFixed(1).padStart(6)}, ${sy.toFixed(1).padStart(6)})  ` +
        `${dx.toFixed(1).padStart(5)}  ${dy.toFixed(1).padStart(5)}  ${tag}`
      );
    }

    lines.push("");
    lines.push(`max Δx: ${maxDx.toFixed(1)}  max Δy: ${maxDy.toFixed(1)}  failing frames: ${fails}/${samples.length}`);

    await new Promise(r => setTimeout(r, 2500));
    const gsapMatrix = gsapEl.getAttribute("transform") || "(none)";
    const smilOuterEl = svg.querySelector('[id^="smil-outer"]');

    lines.push("");
    lines.push("─── Rest state ───");
    lines.push(`GSAP transform: ${gsapMatrix}`);
    lines.push(`SMIL  rect BBox:  x=${smilEl.getBBox().x.toFixed(1)} y=${smilEl.getBBox().y.toFixed(1)}`);
    lines.push(`SMIL  outer BBox: x=${smilOuterEl.getBBox().x.toFixed(1)} y=${smilOuterEl.getBBox().y.toFixed(1)}`);

    writeDebugLog(`g-hack/g-hack-easing/${label}`, lines);

    return { label, maxDx, maxDy, fails, total: samples.length };
  }

  async function run() {
    const output = document.getElementById("output");
    const allLines = [];

    const tasks = [];

    if (document.getElementById("log-p2").checked) {
      tasks.push(
        buildLog("log-p2", "gsap-rect", "smil-rect", "svg-c", "power2-inOut")
      );
    }

    if (document.getElementById("log-ease").checked) {
      tasks.push(
        buildLog("log-ease", "gsap-ease", "smil-ease", "svg-d", "ease-in-out")
      );
    }

    if (tasks.length === 0) {
      output.textContent = "No tests selected — check at least one checkbox.";
      return;
    }

    const results = await Promise.all(tasks);

    for (const r of results) {
      const status = r.fails === 0 && r.maxDx < 1 && r.maxDy < 1 ? "PASS" : "FAIL";
      allLines.push(`${status}  ${r.label.padEnd(20)}  maxΔx=${r.maxDx.toFixed(1)}  maxΔy=${r.maxDy.toFixed(1)}  fails=${r.fails}/${r.total}`);
    }

    allLines.push("");
    allLines.push(`Done — ${results.length} log(s) saved.`);
    output.textContent = allLines.join("\n");
  }

  run();
</script>

</body>
</html>
